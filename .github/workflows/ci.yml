name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build web image
        run: docker build -t test-web ./docker-website

      - name: Build backend image
        run: docker build -t test-backend ./backend

  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start containers
        working-directory: docker-website
        run: docker compose up --build -d

      - name: Wait for backend to become healthy
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/api/users; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not become ready in time"
          exit 1

      - name: Test GET /api/users
        run: curl --fail http://localhost:8080/api/users

      - name: Test POST /api/users
        run: |
          curl --fail -X POST http://localhost:8080/api/users \
            -H "Content-Type: application/json" \
            -d '{"name":"CI_User"}'

      - name: Verify created user exists
        run: |
          curl --fail http://localhost:8080/api/users | grep "CI_User"

      - name: Show logs on failure
        if: failure()
        working-directory: docker-website
        run: docker compose logs
